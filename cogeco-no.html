<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks &mdash; 30 Montcalm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f4f1ec;
    font-family: Georgia, 'Times New Roman', serif;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .wrapper {
    max-width: 520px;
    width: 100%;
  }
  .card {
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    text-align: center;
  }
  .card-top {
    background: #c9a227;
    padding: 32px 40px 24px;
  }
  .card-top .building {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #1a1a1a;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.6;
  }
  .icon {
    width: 56px;
    height: 56px;
    background: rgba(0,0,0,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 22px;
    color: #1a1a1a;
  }
  .card-top h1 {
    font-size: 24px;
    font-weight: 400;
    color: #1a1a1a;
    line-height: 1.3;
  }
  .card-body {
    padding: 32px 40px;
  }
  .card-body p {
    font-size: 15px;
    line-height: 1.75;
    color: #2a2a2a;
    margin-bottom: 16px;
  }
  .card-body .note {
    font-size: 13px;
    color: #8a8a8a;
    font-style: italic;
  }
  .footer {
    background: #faf9f7;
    padding: 16px 40px;
    border-top: 1px solid #ddd7cd;
  }
  .footer p {
    font-size: 12px;
    color: #8a8a8a;
    line-height: 1.6;
  }
  .footer a {
    color: #1c3a2e;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="card-top">
      <div class="building">30 Montcalm &middot; ET Coast Management</div>
      <div class="icon">&#8212;</div>
      <h1>Thanks for letting us know</h1>
    </div>
    <div class="card-body">
      <p>We&#39;ve noted that you&#39;re not interested at this time &mdash; no problem at all. We appreciate you taking a moment to respond.</p>
      <p class="note">If you change your mind or have any questions, don&#39;t hesitate to reach out.</p>
    </div>
    <div class="footer">
      <p>
        Questions? <a href="mailto:info@etcoastmanagement.ca">info@etcoastmanagement.ca</a>
      </p>
    </div>
  </div>
</div>
